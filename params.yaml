paths:
  raw_csv: data/dataset_filtrato.csv
  images_dir: data/images/images_normalized
  processed_dir: data/processed
  checkpoints_dir: outputs/checkpoints
  evaluation_dir: outputs/evaluation
  model_dir: models/Qwen3-VL-2B-Instruct

split:
  seed: 42
  train: 0.8
  val: 0.1
  test: 0.1

mlflow:
  experiment_name: shield-qwen3vl-xray-it
  tracking_uri: http://127.0.0.1:5000
  artifact_root: mlflow/artifacts

training:
  run_name: qwen3vl-2b-qlora-baseline
  base_model: Qwen3-VL-2B-Instruct
  finetuning_method: qlora
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_length: 2048
  seed: 42

peft:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

evaluation:
  bertscore_model_type: xlm-roberta-large
  qualitative_examples: 3
